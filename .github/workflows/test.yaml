name: Castrol Auto Sync

on:
  workflow_dispatch: 
  schedule:
    # 1. Daily at 8:00 PM IST (14:30 UTC)
    - cron: '30 14 * * *'
    
    # 2. Every Saturday, hourly from 5:00 PM to 10:00 PM IST (11:30 to 16:30 UTC)
    - cron: '30 11-16 * * 6'

    # 3. Month End Candidates, hourly from 5:00 PM to 10:00 PM IST (11:30 to 16:30 UTC)
    - cron: '30 11-16 28-31 * *'

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Smart IST Date Checker
        run: |
          # Force the server to calculate dates using Indian Standard Time
          export TZ="Asia/Kolkata"
          
          CURRENT_HOUR=$(date +%H)
          CURRENT_DAY=$(date +%u)
          TOMORROW=$(date -d tomorrow +%d)
          
          echo "Evaluating run for IST Time..."
          echo "Current IST Hour: $CURRENT_HOUR"
          echo "Current Day of Week (1=Mon, 7=Sun): $CURRENT_DAY"
          echo "Tomorrow's Date: $TOMORROW"
          
          SHOULD_RUN=false
          
          # 1. Manual Click Override
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual run detected."
            SHOULD_RUN=true
            
          # 2. Daily 8:00 PM IST Run (Hour 20)
          elif [ "$CURRENT_HOUR" == "20" ]; then
            echo "Matched Daily 8 PM schedule."
            SHOULD_RUN=true
            
          # 3. Saturday 5:00 PM to 10:00 PM IST (Hours 17 to 22)
          elif [ "$CURRENT_DAY" == "6" ] && [ "$CURRENT_HOUR" -ge 17 ] && [ "$CURRENT_HOUR" -le 22 ]; then
            echo "Matched Saturday 5 PM to 10 PM schedule."
            SHOULD_RUN=true
            
          # 4. Last Day of the Month 5:00 PM to 10:00 PM IST (Hours 17 to 22)
          elif [ "$TOMORROW" == "01" ] && [ "$CURRENT_HOUR" -ge 17 ] && [ "$CURRENT_HOUR" -le 22 ]; then
            echo "Matched Month-End 5 PM to 10 PM schedule."
            SHOULD_RUN=true
          fi
          
          if [ "$SHOULD_RUN" == "true" ]; then
            echo "SKIP_RUN=false" >> $GITHUB_ENV
            echo "✅ Schedule matches! Running the Python script..."
          else
            echo "SKIP_RUN=true" >> $GITHUB_ENV
            echo "⏭️ Not the scheduled time in India. Skipping run."
          fi

      - name: Set up Python
        if: env.SKIP_RUN == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        if: env.SKIP_RUN == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager pandas openpyxl

      - name: Run Automation Script
        if: env.SKIP_RUN == 'false'
        env:
          SITE_USERNAME: ${{ secrets.SITE_USERNAME }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: python script.py

      - name: Upload Debug Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            debug_error.png
            downloads/
