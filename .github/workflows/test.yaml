name: Castrol Auto Sync

on:
  workflow_dispatch: # Allows you to still click the "Run workflow" button manually
  schedule:
    # 1. Runs everyday at 7:30 PM IST (14:00 UTC)
    - cron: '0 14 * * *'
    
    # 2. Runs every Saturday every hour from 5:00 PM to 10:00 PM IST (11:30 to 16:30 UTC)
    - cron: '30 11-16 * * 6'

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager pandas openpyxl

      - name: Run Automation Script
        env:
          SITE_USERNAME: ${{ secrets.SITE_USERNAME }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: python script.py

      - name: Upload Debug Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            debug_error.png
            downloads/
