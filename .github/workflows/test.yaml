name: Castrol Auto Login

on:
  workflow_dispatch: 
  schedule:
    - cron: '30 2 * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # Upgraded to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Upgraded to v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Run Script
        env:
          SITE_USERNAME: ${{ secrets.SITE_USERNAME }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: python script.py

      - name: Upload Error Screenshot
        if: failure()
        uses: actions/upload-artifact@v4 # FIXED: Upgraded from v3 to v4
        with:
          name: error-log
          path: login_error.png
