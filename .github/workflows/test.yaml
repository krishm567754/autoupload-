name: Castrol Auto Sync

on:
  workflow_dispatch: 
  schedule:
    # 1. Daily at 8:00 PM IST (14:30 UTC)
    - cron: '30 14 * * *'
    
    # 2. Every Saturday, hourly from 5:00 PM to 10:00 PM IST (11:30 to 16:30 UTC)
    - cron: '30 11-16 * * 6'

    # 3. Month End Candidates, hourly from 5:00 PM to 10:00 PM IST (11:30 to 16:30 UTC)
    - cron: '30 11-16 28-31 * *'

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Smart Date Checker (Manual Bypass Fix)
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          
          # If you clicked "Run workflow" manually, ALWAYS run it.
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "SKIP_RUN=false" >> $GITHUB_ENV
            echo "Manual run detected. Bypassing schedule checks!"
            exit 0
          fi
          
          TOMORROW=$(date -d tomorrow +%d)
          CURRENT_HOUR=$(date +%H)
          CURRENT_DAY=$(date +%u)
          
          # If it is NOT the daily 8 PM run (14:30 UTC)...
          if [ "$CURRENT_HOUR" != "14" ]; then
            # And it's NOT Saturday (6) AND NOT the last day of the month...
            if [ "$CURRENT_DAY" != "6" ] && [ "$TOMORROW" != "01" ]; then
              echo "SKIP_RUN=true" >> $GITHUB_ENV
              echo "Skipping: Not Saturday, not the last day of the month, and not 8 PM."
              exit 0
            fi
          fi
          
          echo "SKIP_RUN=false" >> $GITHUB_ENV
          echo "Schedule rules matched! Running the script..."

      - name: Set up Python
        if: env.SKIP_RUN == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        if: env.SKIP_RUN == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager pandas openpyxl

      - name: Run Automation Script
        if: env.SKIP_RUN == 'false'
        env:
          SITE_USERNAME: ${{ secrets.SITE_USERNAME }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: python script.py

      - name: Upload Debug Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            debug_error.png
            downloads/
