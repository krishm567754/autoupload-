name: Castrol Auto Sync

on:
  workflow_dispatch:

  schedule:
    # ✅ Daily 8:30 PM IST
    - cron: '0 15 * * *'

    # ✅ Saturday 5–10 PM IST (hourly)
    - cron: '30 11-16 * * 6'

    # ✅ Month-end (28–31) 5–10 PM IST (hourly)
    - cron: '30 11-16 28-31 * *'

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔧 Install Chrome (still useful)
      - name: Install Chromium
        run: |
          sudo apt update
          sudo apt install -y chromium-browser

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager pandas openpyxl

      - name: Run Automation Script
        env:
          SITE_USERNAME: ${{ secrets.SITE_USERNAME }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: python script.py

      # 🔍 Debug files if something fails
      - name: Upload Debug Files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: /tmp
