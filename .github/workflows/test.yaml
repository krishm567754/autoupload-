name: Castrol Auto Sync

on:
  workflow_dispatch:

  schedule:
    # 🧪 TEST: 8:36 PM IST (15:06 UTC)
    - cron: '6 15 * * *'

    # (Keep your real schedules below if you want, or comment for testing)

    # Saturday 5–10 PM IST
    - cron: '30 11-16 * * 6'

    # Month-end 5–10 PM IST
    - cron: '30 11-16 28-31 * *'

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Chromium
        run: |
          sudo apt update
          sudo apt install -y chromium-browser

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager pandas openpyxl

      - name: Run Automation Script
        env:
          SITE_USERNAME: ${{ secrets.SITE_USERNAME }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: python script.py

      - name: Upload Debug Files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: /tmp
